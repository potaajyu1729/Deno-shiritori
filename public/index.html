<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しりとり</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>しりとり</h1>

  <p id="previousWord"></p>

  <input id="nextWordInput" type="text" />
  <button id="nextWordSendButton">送信</button>
  <button id="resetButton">リセット</button>

  <script>
    window.onload = async () => {

      const response = await fetch("/shiritori", {
        method: "GET"
      });

      const previousWord = await response.text();

      document.querySelector("#previousWord").innerHTML =
        `前の単語: ${previousWord}`;

      document.querySelector("#nextWordSendButton").onclick = async () => {

        const nextWordInput =
          document.querySelector("#nextWordInput");

        const nextWordInputText =
          nextWordInput.value;

        const response = await fetch(
          "/shiritori",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              nextWord: nextWordInputText
            })
          }
        );

        if (response.status !== 200) {
          const errorJson = await response.text();
          const errorObj = JSON.parse(errorJson);

          alert(errorObj["errorMessage"]);
          return;
        }

        const previousWord = await response.text();

        document.querySelector("#previousWord").innerHTML =
          `前の単語: ${previousWord}`;

        nextWordInput.value = "";
      };

      document.querySelector("#resetButton").onclick = async () => {

        const response = await fetch(
          "/reset",
          {
            method: "POST"
          }
        );

        const previousWord = await response.text();

        document.querySelector("#previousWord").innerHTML =
          `前の単語: ${previousWord}`;

        document.querySelector("#nextWordInput").value = "";
      };
    };
  </script>
</body>

</html>
